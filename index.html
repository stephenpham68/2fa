    <!-- JSON-LD: WebApplication Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Free 2FA Code Generator",
      "url": "https://2fa-tools.pages.dev/",
      "description": "Generate TOTP 2FA codes instantly from your secret key. 100% free, browser-based, no app needed.",
      "applicationCategory": "SecurityApplication",
      "operatingSystem": "Any",
      "browserRequirements": "Requires JavaScript",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Generate TOTP 2FA codes from Base32 secret keys",
        "Auto-refresh every 30 seconds",
        "Support multiple accounts simultaneously",
        "Copy to clipboard in one click",
        "100% browser-based, no data sent to server"
      ],
      "creator": {
        "@type": "Organization",
        "name": "2FA Tools"
      }
    }
    </script>

    <!-- JSON-LD: FAQPage Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Two-Factor Authentication (2FA)?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Two-Factor Authentication (2FA) adds a second layer of security to your accounts. In addition to your password, you also enter a 6-digit code that changes every 30 seconds. Even if someone steals your password, they cannot log in without this code."
          }
        },
        {
          "@type": "Question",
          "name": "Is my 2FA secret key safe to enter here?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. All processing happens 100% in your browser using the Web Crypto API. Your secret key is never sent to any server. You can verify this by checking your browser's network tab — no requests are made when generating codes."
          }
        },
        {
          "@type": "Question",
          "name": "How often does the 2FA code change?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "TOTP codes refresh every 30 seconds, following the RFC 6238 standard. A countdown timer shows how many seconds remain before the current code expires. Codes expiring in 5 seconds or less are highlighted in red as a warning."
          }
        },
        {
          "@type": "Question",
          "name": "Which apps and services support TOTP 2FA?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "TOTP is supported by thousands of services including Google, Facebook, Twitter, GitHub, Dropbox, Amazon, and most banking and crypto platforms. Compatible authenticator apps include Google Authenticator, Microsoft Authenticator, Authy, 1Password, Bitwarden, and many others."
          }
        }
      ]
    }
    </script>
